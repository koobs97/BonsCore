server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Vue Router history mode - SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → 백엔드 Spring Boot
    location /api/ {
        proxy_pass         http://backend:8080/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # OAuth2 콜백 처리
    location /login/oauth2/ {
        proxy_pass       http://backend:8080/login/oauth2/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /oauth2/ {
        proxy_pass       http://backend:8080/oauth2/;
        proxy_set_header Host            $host;
        proxy_set_header X-Real-IP       $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 업로드 이미지 → 백엔드 파일서버
    location /images/ {
        proxy_pass       http://backend:8080/images/;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }

    # Swagger UI
    location /swagger-ui/ {
        proxy_pass       http://backend:8080/swagger-ui/;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass       http://backend:8080/v3/api-docs;
        proxy_set_header Host $host;
    }

    # 정적 자산 브라우저 캐싱
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform";
    }
}
