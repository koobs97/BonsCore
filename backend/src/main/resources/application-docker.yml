server:
  port: 8080

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost}

spring:
  datasource:
    driver-class-name: ${DATASOURCE_DRIVER_CLASS_NAME}
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
      validation-timeout: 2000
      minimum-idle: 5
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: redis   # docker-compose 서비스명
      port: 6379
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: false
        show_sql: false
    database-platform: org.hibernate.dialect.OracleDialect

oauth2:
  redirect:
    url: ${OAUTH2_REDIRECT_URL:http://localhost/oauth/redirect}

file:
  upload-dir: /app/uploads
  resource-url-prefix: /images/
  download-uri-prefix: ${PUBLIC_URL:http://localhost}/images/
  upload-dir-temp: /app/uploads/temp
  temp-resource-url-prefix: /images/temp/
  temp-download-uri-prefix: ${PUBLIC_URL:http://localhost}/images/temp/
