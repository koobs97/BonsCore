server:
  port: 8080

cors:
  allowed-origins: http://localhost:3000

spring:
  datasource:
    driver-class-name: ${DATASOURCE_DRIVER_CLASS_NAME}
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}
    hikari:
      maximum-pool-size: 10
      connection-timeout: 5000
      validation-timeout: 2000
      minimum-idle: 10
      idle-timeout: 600000
      max-lifetime: 1800000

  # Flyway 설정 추가 (중요!)
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true  # 기존 DB가 있을 경우 대비

  jpa:
    hibernate:
      # Flyway를 사용하므로 none 또는 validate 권장 (Daiky 개발시는 update도 가능)
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        show_sql: true
        dialect.oracle.version: 21
    database-platform: org.hibernate.dialect.OracleDialect

  data:
    redis:
      port: 6379
      host: localhost
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

oauth2:
  redirect:
    url: http://localhost:3000/oauth/redirect

file:
  # 실제 파일이 저장될 로컬 컴퓨터의 경로
  upload-dir: C:/bons/BonsCore/uploads
    # 클라이언트가 파일에 접근할 때 사용할 URL 경로
  resource-url-prefix: /images/
  download-uri-prefix: http://localhost:8080/images/
  # 임시 파일이 저장될 경로
  upload-dir-temp: C:/bons/BonsCore/uploads/temp
  temp-resource-url-prefix: /images/temp/
  temp-download-uri-prefix: http://localhost:8080/images/temp/