# ──────────────────────────────────────────────────────────────────
# profile: dev-docker
# 용도: 로컬 개발 환경 (Spring Boot는 IntelliJ에서 실행,
#       Oracle XE + Redis는 docker-compose.dev.yml 컨테이너 사용)
#
# 실행 전 조건:
#   docker-compose -f docker-compose.dev.yml up -d  (Oracle XE + Redis 기동)
# IntelliJ 실행 설정:
#   Active profiles: dev-docker
# ──────────────────────────────────────────────────────────────────

server:
  port: 8080

cors:
  allowed-origins: http://localhost:3000

spring:
  datasource:
    driver-class-name: net.sf.log4jdbc.sql.jdbcapi.DriverSpy
    url: jdbc:log4jdbc:oracle:thin:@localhost:1522/XEPDB1
    username: BONSDEV
    password: bonsdev1234

  data:
    redis:
      host: localhost
      port: 6379

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway가 스키마 관리, JPA는 검증만 수행
    properties:
      hibernate:
        format_sql: true
        show_sql: true
    database-platform: org.hibernate.dialect.OracleDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false   # 신규 DB이므로 baseline 불필요
    validate-on-migrate: true

oauth2:
  redirect:
    url: http://localhost:3000/oauth/redirect

file:
  upload-dir: C:/Study/springboot/uploads
  resource-url-prefix: /images/
  download-uri-prefix: http://localhost:8080/images/
  upload-dir-temp: C:/bons/BonsCore/uploads/temp
  temp-resource-url-prefix: /images/temp/
  temp-download-uri-prefix: http://localhost:8080/images/temp/

logging:
  level:
    org.flywaydb: INFO
