services:

  # ── Oracle XE 21c ────────────────────────────────────────────
  oracle:
    image: gvenzl/oracle-xe:21-slim
    ports:
      - "1521:1521"
    environment:
      ORACLE_PASSWORD: Oracle123!
      APP_USER: BONSCORE
      APP_USER_PASSWORD: bonscore1234
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s BONSCORE/bonscore1234@//localhost:1521/XEPDB1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # ── 백엔드 (Spring Boot) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"       # Swagger UI 직접 접근용. 로컬 8080 충돌 방지
    env_file:
      - ./backend/.env    # 시크릿 값 로드
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CORS_ALLOWED_ORIGINS: http://localhost
      OAUTH2_REDIRECT_URL: http://localhost/oauth/redirect
      PUBLIC_URL: http://localhost
      DATASOURCE_URL: jdbc:log4jdbc:oracle:thin:@oracle:1521/XEPDB1
    volumes:
      - uploads:/app/uploads
    depends_on:
      oracle:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  # ── 프론트엔드 (Vue 3 + Nginx) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # 로컬 Redis(6379)와 충돌 방지. 컨테이너끼리는 redis:6379로 통신
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  uploads:
  redis-data:
  oracle-data:
