services:

  # ── 백엔드 (Spring Boot) ──────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"       # Swagger UI 직접 접근용. 로컬 8080 충돌 방지
    env_file:
      - ./backend/.env    # 시크릿 값 로드
    environment:
      SPRING_PROFILES_ACTIVE: docker
      CORS_ALLOWED_ORIGINS: http://localhost
      OAUTH2_REDIRECT_URL: http://localhost/oauth/redirect
      PUBLIC_URL: http://localhost
      # 컨테이너에서 호스트 Oracle에 접근 (127.0.0.1 대신 host.docker.internal 사용)
      DATASOURCE_URL: jdbc:log4jdbc:oracle:thin:@host.docker.internal:1521:orcl
    volumes:
      - uploads:/app/uploads
    depends_on:
      - redis
    restart: unless-stopped

  # ── 프론트엔드 (Vue 3 + Nginx) ────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"   # 로컬 Redis(6379)와 충돌 방지. 컨테이너끼리는 redis:6379로 통신
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  uploads:
  redis-data:
